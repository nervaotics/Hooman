appId: com.hooman.desktop
productName: Hooman
copyright: Copyright © 2026

directories:
  output: release

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraMetadata:
  main: electron/main.cjs

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Hooman
