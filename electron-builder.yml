appId: com.hooman.desktop
productName: Hooman
copyright: Copyright © 2026

directories:
  output: release

asarUnpack:
  - electron/db/migrations/**
  - supabase/migrations/**

files:
  - dist/**/*
  - electron/**/*
  - supabase/**/*
  - package.json

extraMetadata:
  main: electron/main.cjs

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Hooman

publish:
  provider: github
  owner: nervaotics
  repo: Hooman
